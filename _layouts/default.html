<!DOCTYPE html>
<html lang="zh" data-lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="{{ '/assets/js/i18n.js' | relative_url }}"></script>
</head>
<body>
    <header class="site-header">
        <nav class="container">
            <a href="{{ '/' | relative_url }}" class="logo">
                <img src="/images/cdqz.webp" alt="成都七中" class="logo-image">
                <span class="logo-text">{{ site.title }}</span>
            </a>
            <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
            <ul class="nav-links">
                <li><a href="{{ '/' | relative_url }}"><span class="zh">首页</span><span class="en">Home</span></a></li>
                <li><a href="{{ '/about' | relative_url }}"><span class="zh">关于我们</span><span class="en">About</span></a></li>
                <li><a href="{{ '/blog' | relative_url }}"><span class="zh">博客</span><span class="en">Blog</span></a></li>
                <li><a href="{{ '/donation' | relative_url }}"><span class="zh">捐赠</span><span class="en">Donate</span></a></li>
            </ul>
            <button id="lang-toggle" class="lang-toggle">EN</button>
        </nav>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
            <p class="footer-legal">CHENGDU NO 7 HIGH SCHOOL ALUMNI ASSOCIATION NORTH AMERICA INC &nbsp;|&nbsp; A 501(c)(3) Nonprofit Organization &nbsp;|&nbsp; EIN: 41-4533517</p>
        </div>
    </footer>

    <script>
        document.querySelector('.nav-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
